[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    unit: Pure unit tests (no database or single-layer mocks).
    integration: Cross-layer flows (DB + services + analytics).
    uat: User acceptance scenarios (business journeys).
    edge: Boundary and failure-mode cases.
